<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Xhire</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:transparent;color:#e2e8f0;font-family:Inter,sans-serif;border-radius:12px}

.container{height:100%;background:rgba(6,8,15,.95);border-radius:12px;border:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;overflow:hidden}

/* Titlebar */
.titlebar{height:36px;background:#0c1019;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;padding:0 14px;-webkit-app-region:drag;flex-shrink:0;border-radius:12px 12px 0 0}
.titlebar h1{font:700 11px Inter,sans-serif;color:#94a3b8;display:flex;align-items:center;gap:6px}
.titlebar .dot{width:7px;height:7px;border-radius:50%;background:#FBBF24}

/* Body */
.body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center;gap:16px;-webkit-app-region:no-drag}

.logo{font:800 28px Inter,sans-serif;background:linear-gradient(135deg,#7c3aed,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:2px}
.sub{font:400 13px Inter,sans-serif;color:#64748b;max-width:280px;line-height:1.6}

.form{width:100%;max-width:300px;display:flex;flex-direction:column;gap:10px}
.form input{width:100%;padding:10px 14px;border:1px solid rgba(255,255,255,.1);border-radius:8px;background:rgba(255,255,255,.05);color:#e2e8f0;font:400 13px Inter,sans-serif;outline:none;transition:.15s;cursor:text;-webkit-user-select:text;user-select:text}
.form input:focus{border-color:#7c3aed;background:rgba(255,255,255,.08)}
.form input::placeholder{color:#4b5563}

.connect-btn{width:100%;padding:12px;border:none;border-radius:8px;background:linear-gradient(135deg,#7c3aed,#6d28d9);font:700 13px Inter,sans-serif;color:#fff;cursor:pointer;transition:.15s}
.connect-btn:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(124,58,237,.3)}
.connect-btn:active{transform:translateY(0)}
.connect-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

.divider{display:flex;align-items:center;gap:12px;width:100%;max-width:300px;margin:2px 0}
.divider-line{flex:1;height:1px;background:rgba(255,255,255,.08)}
.divider-text{font:500 10px Inter,sans-serif;color:#475569;text-transform:uppercase;letter-spacing:.5px}

#google-btn-wrap{width:100%;max-width:300px;display:flex;justify-content:center;min-height:44px}

.error{font:500 11px Inter,sans-serif;color:#F87171;padding:6px 10px;background:rgba(248,113,113,.08);border-radius:6px;display:none;width:100%;max-width:300px;text-align:center}

.sessions{width:100%;max-width:340px;display:flex;flex-direction:column;gap:8px;max-height:280px;overflow-y:auto;padding:2px}
.sessions::-webkit-scrollbar{width:3px}
.sessions::-webkit-scrollbar-thumb{background:rgba(124,58,237,.3);border-radius:2px}
.session-item{padding:12px 14px;border:1px solid rgba(255,255,255,.08);border-radius:12px;background:rgba(255,255,255,.03);cursor:pointer;text-align:left;transition:all .2s ease;display:flex;align-items:center;gap:12px}
.session-item:hover{border-color:rgba(124,58,237,.4);background:rgba(124,58,237,.08);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.2)}
.session-item:active{transform:translateY(0)}
.s-avatar{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font:800 16px Inter,sans-serif;color:#fff;flex-shrink:0;letter-spacing:-.5px;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.s-info{flex:1;min-width:0}
.session-item .s-company{font:600 13px Inter,sans-serif;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.session-item .s-role{font:400 11px Inter,sans-serif;color:#64748b;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:4px}
.s-role-icon{opacity:.5;flex-shrink:0}

.step{display:none}
.step.active{display:flex;flex-direction:column;align-items:center;gap:14px;width:100%}
.back-btn{font:500 11px Inter,sans-serif;color:#64748b;background:none;border:none;cursor:pointer}
.back-btn:hover{color:#a78bfa}

@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:16px;height:16px;border:2px solid rgba(167,139,250,.3);border-top-color:#a78bfa;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
</style>
</head>
<body>
<div class="container">
  <div class="titlebar">
    <h1><span class="dot"></span> Xhire Overlay</h1>
  </div>
  <div class="body">
    <!-- Step 1: Login -->
    <div id="step-login" class="step active">
      <div class="logo">Xhire</div>
      <div class="sub">Sign in to start your interview overlay.</div>
      <div class="form">
        <input id="email" type="email" placeholder="Email" autocomplete="email" spellcheck="false">
        <input id="password" type="password" placeholder="Password" autocomplete="current-password">
        <button id="login-btn" class="connect-btn" onclick="doLogin()">Sign In</button>
      </div>
      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-text">or</div>
        <div class="divider-line"></div>
      </div>
      <div id="google-btn-wrap"></div>
      <button id="google-fallback" class="connect-btn" style="display:none;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12)" onclick="googleFallback()">
        <span style="display:flex;align-items:center;justify-content:center;gap:8px">
          <svg width="16" height="16" viewBox="0 0 48 48"><path fill="#4285F4" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#34A853" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 010-9.18l-7.98-6.19a24.01 24.01 0 000 21.56l7.98-6.19z"/><path fill="#EA4335" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Continue with Google
        </span>
      </button>
      <div id="login-error" class="error"></div>
    </div>

    <!-- Step 2: Pick Session -->
    <div id="step-sessions" class="step">
      <div class="sub">Select a session:</div>
      <div id="session-list" class="sessions"></div>
      <button class="back-btn" onclick="showStep('step-login')">&larr; Back</button>
    </div>

    <!-- Step 3: Connecting -->
    <div id="step-connecting" class="step">
      <span class="spinner"></span>
      <div class="sub">Loading session...</div>
    </div>
  </div>
</div>

<script>
var SERVER = '';
var authToken = '';
var userId = '';
var GOOGLE_CLIENT_ID = '';

// Persist token so Electron doesn't lose session on hide/show or restart
function saveToken(token, uid) {
  authToken = token;
  userId = uid || '';
  try { localStorage.setItem('xhire_token', token); localStorage.setItem('xhire_uid', uid || ''); } catch(e) {}
}
function clearSavedToken() {
  authToken = '';
  userId = '';
  try { localStorage.removeItem('xhire_token'); localStorage.removeItem('xhire_uid'); } catch(e) {}
}

// Get server URL and config
(async function() {
  if (window.electronAPI) {
    SERVER = await window.electronAPI.getServerUrl();
  } else {
    SERVER = location.origin || 'https://xhire.app';
  }
  // Fetch Google Client ID from server config
  try {
    var cfgRes = await fetch(SERVER + '/api/config');
    var cfg = await cfgRes.json();
    if (cfg.googleClientId) {
      GOOGLE_CLIENT_ID = cfg.googleClientId;
      initGoogleAuth();
    }
  } catch(e) { console.log('Config fetch failed:', e); }

  // Try to restore saved session (Electron or returning web user)
  try {
    var saved = localStorage.getItem('xhire_token');
    if (saved) {
      authToken = saved;
      userId = localStorage.getItem('xhire_uid') || '';
      var res = await fetch(SERVER + '/api/auth/me', { headers: { 'Authorization': 'Bearer ' + saved } });
      if (res.ok) {
        var data = await res.json();
        if (data.token) saveToken(data.token, data.user ? data.user.id : userId);
        loadSessions();
        return;
      } else {
        clearSavedToken();
      }
    }
  } catch(e) { clearSavedToken(); }
})();

var gsiRetries = 0;
function initGoogleAuth() {
  if (!window.google || !GOOGLE_CLIENT_ID) {
    gsiRetries++;
    if (gsiRetries > 10) {
      // GSI library failed to load — show fallback button
      console.log('GSI library not available, showing fallback');
      document.getElementById('google-fallback').style.display = 'block';
      return;
    }
    setTimeout(initGoogleAuth, 300);
    return;
  }
  try {
    google.accounts.id.initialize({
      client_id: GOOGLE_CLIENT_ID,
      callback: handleGoogleResponse
    });
    google.accounts.id.renderButton(
      document.getElementById('google-btn-wrap'),
      { theme: 'filled_black', size: 'large', width: 300, text: 'continue_with', shape: 'pill' }
    );
    // If button didn't render after a moment, show fallback
    setTimeout(function() {
      var wrap = document.getElementById('google-btn-wrap');
      if (wrap && wrap.children.length === 0) {
        document.getElementById('google-fallback').style.display = 'block';
      }
    }, 1500);
  } catch(e) {
    console.log('GSI init failed:', e);
    document.getElementById('google-fallback').style.display = 'block';
  }
}

function googleFallback() {
  // Open Google OAuth in a popup/redirect flow
  if (!GOOGLE_CLIENT_ID) { showError('Google sign-in not configured'); return; }
  var redirectUri = SERVER + '/api/auth/google/callback';
  var url = 'https://accounts.google.com/o/oauth2/v2/auth?client_id=' + encodeURIComponent(GOOGLE_CLIENT_ID)
    + '&redirect_uri=' + encodeURIComponent(redirectUri)
    + '&response_type=code&scope=openid%20email%20profile&prompt=select_account';
  window.location.href = url;
}

async function handleGoogleResponse(response) {
  try {
    var res = await fetch(SERVER + '/api/auth/google', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ credential: response.credential })
    });
    var data = await res.json();
    if (!res.ok || !data.token) { showError(data.error || 'Google sign-in failed'); return; }
    saveToken(data.token, data.user ? data.user.id : '');
    loadSessions();
  } catch(e) {
    showError('Google sign-in failed');
  }
}

function showStep(id) {
  document.querySelectorAll('.step').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

function showError(msg) {
  var el = document.getElementById('login-error');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(function() { el.style.display = 'none'; }, 4000);
}

async function doLogin() {
  var email = document.getElementById('email').value.trim();
  var pass = document.getElementById('password').value;
  if (!email || !pass) { showError('Enter email and password'); return; }

  var btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = 'Signing in...';

  try {
    var res = await fetch(SERVER + '/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, password: pass })
    });
    var data = await res.json();
    if (!res.ok || !data.token) { showError(data.error || 'Login failed'); btn.disabled = false; btn.textContent = 'Sign In'; return; }

    saveToken(data.token, data.user ? data.user.id : (data.userId || data.user_id || ''));
    loadSessions();
  } catch (e) {
    showError('Cannot reach server');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

async function loadSessions() {
  try {
    var res = await fetch(SERVER + '/api/sessions', {
      headers: { 'Authorization': 'Bearer ' + authToken }
    });
    var sessions = await res.json();
    var list = document.getElementById('session-list');
    list.innerHTML = '';

    if (!sessions.length) {
      list.innerHTML = '<div class="sub">No sessions yet. Create one on xhire.app first.</div>';
      showStep('step-sessions');
      return;
    }

    var gradients = [
      ['#7C3AED','#6366F1'],['#EC4899','#F43F5E'],['#F59E0B','#EF4444'],
      ['#10B981','#06B6D4'],['#3B82F6','#8B5CF6'],['#F97316','#FBBF24'],
      ['#14B8A6','#22D3EE'],['#E11D48','#BE185D'],['#8B5CF6','#EC4899'],
      ['#059669','#10B981']
    ];
    sessions.forEach(function(s, i) {
      var company = s.company || 'Untitled';
      var initial = company.charAt(0).toUpperCase();
      var g = gradients[i % gradients.length];
      var div = document.createElement('div');
      div.className = 'session-item';
      div.innerHTML = '<div class="s-avatar" style="background:linear-gradient(135deg,' + g[0] + ',' + g[1] + ')">' + esc(initial) + '</div>'
        + '<div class="s-info"><div class="s-company">' + esc(company) + '</div>'
        + '<div class="s-role"><svg class="s-role-icon" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a4 4 0 00-8 0v2"/></svg>' + esc(s.role || 'No role') + '</div></div>';
      div.onclick = function() { connectToSession(s.id); };
      list.appendChild(div);
    });

    showStep('step-sessions');
  } catch (e) {
    showError('Failed to load sessions');
  }
}

function connectToSession(sessionId) {
  showStep('step-connecting');
  var canvasUrl = SERVER + '/canvas?token=' + encodeURIComponent(authToken) + '&session=' + encodeURIComponent(sessionId) + '&electron=1';
  if (window.electronAPI) {
    window.electronAPI.loadCanvas(canvasUrl);
  } else {
    window.location.href = canvasUrl;
  }
}

function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// Enter key to login
document.getElementById('password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('email').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('password').focus();
});
// Auto-focus email on load
setTimeout(function() { document.getElementById('email').focus(); }, 200);

// Handle Google OAuth redirect callback
(function() {
  var p = new URLSearchParams(location.search);
  if (p.get('authed') === '1' && p.get('token')) {
    authToken = p.get('token');
    // Clean URL
    history.replaceState(null, '', location.pathname);
    loadSessions();
  }
})();
</script>
</body>
</html>
