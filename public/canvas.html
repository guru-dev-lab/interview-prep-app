<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Xhire Pilot</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080f;--surface:#0c1019;--accent:#7c3aed;--accent2:#a78bfa;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--glass-border:rgba(255,255,255,.06)}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:Inter,sans-serif;border-radius:12px;display:flex;flex-direction:column}
button,input,select{-webkit-app-region:no-drag;cursor:pointer}
input[type=text],input[type=email],input[type=password]{cursor:text}

/* Titlebar �� draggable */
.titlebar{height:28px;background:linear-gradient(180deg,var(--surface),rgba(12,16,25,.95));border-bottom:1px solid var(--glass-border);display:flex;align-items:center;justify-content:space-between;padding:0 12px;-webkit-app-region:drag;flex-shrink:0;border-radius:12px 12px 0 0}
.titlebar h1{font:700 10px Inter,sans-serif;color:var(--text2);display:flex;align-items:center;gap:5px}
.titlebar .dot{width:6px;height:6px;border-radius:50%;background:#F87171;animation:pulse 1.5s ease infinite;box-shadow:0 0 6px rgba(248,113,113,.4)}
.titlebar-right{display:flex;gap:5px;align-items:center;-webkit-app-region:no-drag}
.tb-select{font-size:8px;padding:1px 3px;border-radius:4px}

/* Control bar — single row */
.control-bar{display:flex;align-items:center;gap:5px;padding:4px 10px;background:var(--surface);border-bottom:1px solid var(--glass-border);flex-shrink:0;-webkit-app-region:no-drag;overflow-x:auto}
.ctrl-btn{padding:3px 7px;border:1px solid rgba(255,255,255,.1);border-radius:5px;background:rgba(255,255,255,.05);font:600 9px Inter,sans-serif;color:var(--text3);cursor:pointer;transition:.15s;white-space:nowrap;flex-shrink:0}
.ctrl-btn:hover{border-color:var(--accent);color:var(--text2)}
.ctrl-btn.active-green{background:rgba(5,150,105,.15);color:#34D399;border-color:rgba(52,211,153,.3)}
.ctrl-btn.active-red{background:rgba(239,68,68,.12);color:#F87171;border-color:rgba(248,113,113,.3)}
.status{font:600 9px Inter,sans-serif;padding:3px 8px;border-radius:10px;letter-spacing:.3px;text-transform:uppercase}
.status.off{background:rgba(248,113,113,.1);color:#F87171}
.status.on{background:rgba(52,211,153,.1);color:#34D399}
.status.wait{background:rgba(251,191,36,.1);color:#FBBF24}

/* Main layout — flex fills remaining space regardless of header height */
.canvas-wrap{display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden}

/* Feed — scrollable center */
.feed-wrap{flex:1;overflow-y:auto;padding:10px 14px;scroll-behavior:smooth;background:radial-gradient(ellipse at 50% 0%,rgba(124,58,237,.03) 0%,transparent 70%)}
.feed-wrap::-webkit-scrollbar{width:4px}
.feed-wrap::-webkit-scrollbar-thumb{background:rgba(124,58,237,.25);border-radius:3px}
.feed-wrap::-webkit-scrollbar-thumb:hover{background:rgba(124,58,237,.4)}

/* Cards — left accent border for instant scan */
.sc-card{margin-bottom:12px;border-radius:10px;border:1px solid rgba(255,255,255,.07);border-left:3px solid var(--accent);background:rgba(255,255,255,.025);overflow:hidden;animation:cardIn .35s cubic-bezier(.22,1,.36,1);position:relative;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.sc-card.tag-matched{border-left-color:#34D399}
.sc-card.tag-generated{border-left-color:#FB923C}
.sc-card.tag-new{border-left-color:#FBBF24}
.sc-card.tag-manual{border-left-color:#60A5FA}
.sc-card.tag-screen{border-left-color:#38BDF8}
.sc-card.tag-system{border-left-color:#F87171}
@keyframes cardIn{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
/* Glow pulse on new card */
@keyframes cardGlow{0%{box-shadow:0 2px 8px rgba(0,0,0,.25),0 0 0 0 rgba(124,58,237,.2)}50%{box-shadow:0 2px 8px rgba(0,0,0,.25),0 0 16px 2px rgba(124,58,237,.15)}100%{box-shadow:0 2px 8px rgba(0,0,0,.25),0 0 0 0 rgba(124,58,237,0)}}
.sc-card.card-new{animation:cardIn .35s cubic-bezier(.22,1,.36,1),cardGlow 1.2s ease .3s}

/* Question header */
.sc-card-q{padding:10px 14px;background:linear-gradient(135deg,rgba(124,58,237,.05),rgba(99,102,241,.02));border-bottom:1px solid rgba(255,255,255,.05);display:flex;gap:8px;align-items:flex-start}
.sc-tag{font:700 8px Inter,sans-serif;padding:3px 8px;border-radius:10px;text-transform:uppercase;flex-shrink:0;margin-top:2px;letter-spacing:.5px;display:inline-flex;align-items:center;gap:4px}
.sc-tag::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.sc-tag.matched{background:rgba(52,211,153,.1);color:#34D399}
.sc-tag.new{background:rgba(251,191,36,.1);color:#FBBF24}
.sc-tag.manual{background:rgba(96,165,250,.1);color:#60A5FA}
.sc-tag.generated{background:rgba(251,146,60,.1);color:#FB923C}
.sc-tag.screen{background:rgba(56,189,248,.1);color:#38BDF8}
.sc-tag.system{background:rgba(248,113,113,.1);color:#F87171}
.card-dismiss{position:absolute;top:6px;right:8px;background:none;border:none;color:var(--text3);cursor:pointer;font:400 14px sans-serif;opacity:.3;transition:.2s;padding:2px 6px;z-index:1;border-radius:4px}
.card-dismiss:hover{opacity:1;color:#F87171;background:rgba(248,113,113,.08)}
@keyframes cardOut{from{opacity:1;max-height:500px;transform:scale(1)}to{opacity:0;max-height:0;margin-bottom:0;padding:0;border-width:0;transform:scale(.96)}}
.sc-card.fade-out{animation:cardOut .4s ease forwards;pointer-events:none}

/* Filters */
.filter-bar{display:flex;gap:6px;padding:6px 14px 0;flex-shrink:0}
.filter-btn{padding:4px 10px;border:1px solid var(--glass-border);border-radius:10px;background:rgba(255,255,255,.03);font:600 10px Inter,sans-serif;color:var(--text3);cursor:pointer;transition:.2s;text-transform:uppercase;letter-spacing:.3px}
.filter-btn:hover{border-color:var(--accent);background:rgba(124,58,237,.05)}
.filter-btn.active{background:rgba(124,58,237,.12);color:var(--accent2);border-color:rgba(124,58,237,.3)}

/* Question & answer text */
.sc-q-text{font:600 12.5px/1.5 Inter,sans-serif;color:var(--text)}
.sc-card-a{padding:12px 14px;font:400 12px/1.85 Inter,sans-serif;color:#c8d1dc}
.sc-card-a p,.sc-card-a .sc-line+.sc-line{margin-top:2px}
.sc-card-a strong,.sc-card-a b{color:#e2e8f0;font-weight:600}
.sc-card-a pre{background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:12px 14px;margin:8px 0;overflow-x:hidden;white-space:pre-wrap;word-wrap:break-word;word-break:break-word;font:400 11.5px/1.7 'Fira Code',Consolas,'Courier New',monospace;color:#e6edf3;position:relative}
.sc-card-a pre::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(180deg,var(--accent),rgba(124,58,237,.2));border-radius:3px 0 0 3px}
.sc-card-a pre code{background:none !important;padding:0;font-size:11.5px;color:inherit;border:none !important}
.sc-card-a code{background:rgba(124,58,237,.1);padding:2px 7px;border-radius:5px;font:500 11px 'Fira Code',Consolas,'Courier New',monospace;color:#c4b5fd;border:1px solid rgba(124,58,237,.12)}
.sh-kw{color:#ff79c6}.sh-str{color:#50fa7b}.sh-cmt{color:#6272a4;font-style:italic}.sh-num{color:#bd93f9}.sh-fn{color:#8be9fd}.sh-dec{color:#ffb86c}
.sc-line{margin-bottom:1px;padding:4px 10px;border-radius:5px}
.sc-line:nth-child(odd){background:rgba(255,255,255,.015)}
.sc-blank{height:6px}
.sc-card-loading{padding:14px;display:flex;align-items:center;gap:8px;color:var(--accent2);font:500 12px Inter,sans-serif}
.light-btn{padding:3px 8px;border:1px solid rgba(255,255,255,.1);border-radius:5px;background:rgba(255,255,255,.05);font:600 9px Inter,sans-serif;color:var(--text3);cursor:pointer;transition:.15s;-webkit-app-region:no-drag}.light-btn:hover{border-color:var(--accent)}

/* Dropdowns */
.style-select{padding:2px 6px;border:1px solid rgba(255,255,255,.1);border-radius:6px;background:rgba(255,255,255,.05);font:600 9px Inter,sans-serif;color:var(--text3);cursor:pointer;outline:none;-webkit-app-region:no-drag;transition:.15s}
.style-select:hover{border-color:rgba(124,58,237,.3)}
.style-select option{background:#0c1019;color:#e2e8f0}

/* ===== LOOK: Glass ===== */
body.look-glass .sc-card{background:linear-gradient(135deg,rgba(124,58,237,.04),rgba(99,102,241,.02));border-color:rgba(124,58,237,.1);border-left-width:3px;box-shadow:0 2px 12px rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.04);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
body.look-glass .sc-card-q{background:linear-gradient(135deg,rgba(124,58,237,.07),rgba(99,102,241,.02));border-color:rgba(124,58,237,.08)}
body.look-glass .sc-card-a code{background:rgba(124,58,237,.1);color:#c4b5fd;border-color:rgba(124,58,237,.15)}
body.look-glass .sc-line:nth-child(odd){background:rgba(124,58,237,.025)}

/* ===== LOOK: Neon ===== */
body.look-neon .sc-card{background:rgba(0,0,0,.55);border-color:rgba(124,58,237,.3);box-shadow:0 0 20px rgba(124,58,237,.08),0 4px 16px rgba(0,0,0,.35)}
body.look-neon .sc-card.card-new{animation:cardIn .35s cubic-bezier(.22,1,.36,1),neonGlow 1.5s ease .3s}
@keyframes neonGlow{0%{box-shadow:0 0 20px rgba(124,58,237,.08),0 4px 16px rgba(0,0,0,.35),0 0 0 0 rgba(124,58,237,.3)}50%{box-shadow:0 0 20px rgba(124,58,237,.08),0 4px 16px rgba(0,0,0,.35),0 0 24px 4px rgba(124,58,237,.2)}100%{box-shadow:0 0 20px rgba(124,58,237,.08),0 4px 16px rgba(0,0,0,.35),0 0 0 0 rgba(124,58,237,0)}}
body.look-neon .sc-card-q{background:rgba(124,58,237,.1);border-color:rgba(124,58,237,.15)}
body.look-neon .sc-tag{text-shadow:0 0 8px currentColor}
body.look-neon .sc-card-a code{background:rgba(124,58,237,.15);color:#c4b5fd;border-color:rgba(124,58,237,.2)}
body.look-neon .sc-card-a pre{border-color:rgba(124,58,237,.2)}
body.look-neon .sc-card-a pre::before{background:linear-gradient(180deg,#a78bfa,rgba(124,58,237,.3))}

/* ===== LOOK: Ocean ===== */
body.look-ocean .sc-card{background:linear-gradient(135deg,rgba(6,182,212,.04),rgba(59,130,246,.02));border-color:rgba(6,182,212,.12);box-shadow:0 2px 10px rgba(0,0,0,.18)}
body.look-ocean .sc-card.tag-matched{border-left-color:#22D3EE}
body.look-ocean .sc-card-q{background:rgba(6,182,212,.06);border-color:rgba(6,182,212,.08)}
body.look-ocean .sc-card-a code{background:rgba(6,182,212,.1);color:#67E8F9;border-color:rgba(6,182,212,.15)}
body.look-ocean .sc-card-a pre::before{background:linear-gradient(180deg,#06B6D4,rgba(6,182,212,.2))}
body.look-ocean .filter-btn.active{background:rgba(6,182,212,.12);color:#22D3EE;border-color:rgba(6,182,212,.3)}

/* ===== LIGHT MODE ===== */
body.light-mode,html.light-mode{--bg:#f4f4f7;--surface:#ebedf2;--text:#111827;--text2:#1f2937;--text3:#4b5563;--glass-border:rgba(0,0,0,.08);--accent2:#6d28d9}
body.light-mode .sc-card{background:#fff;border-color:rgba(0,0,0,.08);box-shadow:0 1px 6px rgba(0,0,0,.06)}
body.light-mode .sc-card-q{background:rgba(109,40,217,.04);border-color:rgba(109,40,217,.06)}
body.light-mode .sc-card-a{color:#1f2937}
body.light-mode .sc-card-a strong{color:#111827}
body.light-mode .sc-card-a pre{background:#0d1117;color:#e6edf3;border-color:#21262d}
body.light-mode .sc-card-a pre code{color:#e6edf3;background:none !important}
body.light-mode .sc-card-a code{background:rgba(109,40,217,.06);color:#6d28d9;border-color:rgba(109,40,217,.1)}
body.light-mode .sc-line:nth-child(odd){background:rgba(0,0,0,.02)}
body.light-mode .titlebar{background:#ebedf2;border-color:rgba(0,0,0,.06)}
body.light-mode .control-bar{background:#ebedf2;border-color:rgba(0,0,0,.06)}
body.light-mode .ctrl-btn,.light-mode .style-select{background:rgba(0,0,0,.03);border-color:rgba(0,0,0,.08);color:#4b5563}
body.light-mode .style-select option{background:#fff;color:#111}
body.light-mode .action-btn{background:rgba(0,0,0,.02);border-color:rgba(0,0,0,.08);color:#4b5563}
body.light-mode .bottom-bar{background:#ebedf2;border-color:rgba(0,0,0,.06)}
body.light-mode .input-row input{background:#fff;border-color:rgba(0,0,0,.1);color:#111827}
body.light-mode .filter-btn{background:rgba(0,0,0,.02);border-color:rgba(0,0,0,.06)}
body.light-mode .filter-btn.active{background:rgba(109,40,217,.08);color:#6d28d9;border-color:rgba(109,40,217,.2)}

/* Bottom bar — "What should I say?" + input */
.bottom-bar{flex-shrink:0;background:var(--surface);border-top:1px solid var(--glass-border);padding:8px 10px;-webkit-app-region:no-drag;border-radius:0 0 12px 12px}
.action-row{display:flex;gap:5px;margin-bottom:6px}
.action-btn{flex:1;padding:7px 4px;border:1px solid rgba(255,255,255,.08);border-radius:8px;background:rgba(255,255,255,.03);font:600 10px Inter,sans-serif;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;transition:.2s;white-space:nowrap}
.action-btn:hover{border-color:var(--accent);color:var(--text2);background:rgba(124,58,237,.06)}
.action-btn.primary{border:none;color:#fff;background:linear-gradient(135deg,#7c3aed,#6d28d9);box-shadow:0 2px 8px rgba(124,58,237,.25)}
.action-btn.primary:hover{box-shadow:0 4px 14px rgba(124,58,237,.35);transform:translateY(-1px)}
.action-btn.loading{opacity:.5;pointer-events:none}
.action-btn.recording{border-color:#F87171;background:rgba(248,113,113,.1);color:#fca5a5;animation:pulse 1.5s ease infinite}
.input-row{display:flex;gap:6px}
.input-row input{flex:1;padding:9px 12px;border:1px solid rgba(255,255,255,.07);border-radius:8px;font:400 12px Inter,sans-serif;color:var(--text);background:rgba(255,255,255,.025);outline:none;transition:.2s}
.input-row input:focus{border-color:var(--accent);background:rgba(255,255,255,.04)}
.input-row button{padding:9px 16px;border:none;border-radius:8px;font:700 11px Inter,sans-serif;background:linear-gradient(135deg,#7c3aed,#6366f1);color:#fff;cursor:pointer;transition:.2s;box-shadow:0 2px 6px rgba(124,58,237,.2)}
.input-row button:hover{box-shadow:0 3px 10px rgba(124,58,237,.3);transform:translateY(-1px)}

/* Empty state */
.empty-state{text-align:center;padding:50px 20px;color:var(--text3)}
.empty-state svg{margin-bottom:14px;opacity:.4}
.empty-state h3{font:700 16px Inter,sans-serif;color:var(--text);margin-bottom:8px;background:linear-gradient(135deg,#c4b5fd,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.empty-state p{font:400 12px/1.6 Inter,sans-serif;max-width:280px;margin:0 auto}

/* Session picker */
.session-item{padding:12px 14px;margin-bottom:8px;border:1px solid var(--glass-border);border-radius:10px;background:rgba(255,255,255,.02);cursor:pointer;transition:border-color .15s}
.session-item:hover{border-color:var(--accent)}
.session-item h4{font:600 13px Inter,sans-serif;color:var(--text)}
.session-item p{font:400 11px Inter,sans-serif;color:var(--text3);margin-top:3px}

/* Spinner */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.spinner{display:inline-block;border:2px solid rgba(124,58,237,.2);border-top-color:var(--accent2);border-radius:50%;animation:spin .6s linear infinite}
</style>
</head>
<body>
<!-- Draggable titlebar — minimal -->
<div class="titlebar">
  <h1><span class="dot"></span> Xhire Pilot</h1>
  <div class="titlebar-right">
    <button class="light-btn" onclick="changeFontSize(-1)" title="Smaller">A-</button>
    <button class="light-btn" onclick="changeFontSize(1)" title="Bigger">A+</button>
    <select class="style-select tb-select" id="look-picker" onchange="setTheme(this.value)" title="Card look">
      <option value="glass">Glass</option><option value="minimal">Minimal</option><option value="neon">Neon</option><option value="ocean">Ocean</option>
    </select>
    <button class="light-btn" id="light-toggle" onclick="toggleLightMode()" title="Toggle light/dark">Light</button>
    <button class="light-btn" onclick="doLogout()" style="color:#F87171;border-color:rgba(248,113,113,.3)" title="Logout">Out</button>
    <span class="status off" id="ws-status">Offline</span>
    <button class="light-btn" id="btn-quit" style="display:none;color:#F87171;border-color:rgba(248,113,113,.3)" onclick="quitApp()" title="Quit Xhire">✕</button>
  </div>
</div>
<!-- Control bar — live essentials only -->
<div class="control-bar" id="control-bar">
  <button class="ctrl-btn" id="btn-live-tb" style="display:none" onclick="toggleElectronLive()">Go Live</button>
  <button class="ctrl-btn" id="btn-stealth" style="display:none" onclick="toggleStealth()">Stealth: On</button>
  <select class="style-select" id="answer-style-picker" onchange="changeAnswerStyle(this.value)" title="Answer style">
    <option value="conversational">💬 Conversational</option>
    <option value="direct">🎯 Direct</option>
    <option value="technical">⚙️ Technical</option>
    <option value="executive">📊 Executive</option>
    <option value="star">⭐ STAR</option>
    <option value="storytelling">📖 Storytelling</option>
    <option value="datadriven">📈 Data-Driven</option>
  </select>
</div>

<div class="canvas-wrap">
  <!-- Filter bar -->
  <div class="filter-bar">
    <button class="filter-btn active" id="filter-all" onclick="setFilter('all')">All</button>
    <button class="filter-btn" id="filter-generated" onclick="setFilter('generated')">AI Generated</button>
  </div>
  <!-- Answer feed — scrollable -->
  <div class="feed-wrap" id="feed">
    <div class="empty-state" id="empty-state">
      <svg width="40" height="40" fill="none" stroke="#7c3aed" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      <h3>Xhire Pilot Ready</h3>
      <p id="empty-msg">Click Go Live above to start capturing audio.</p>
    </div>
  </div>

  <!-- Bottom bar — all action buttons in one row + input -->
  <div class="bottom-bar">
    <div class="action-row">
      <button class="action-btn primary" id="btn-wsay" onclick="whatShouldISay()">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        Say?
      </button>
      <button class="action-btn" id="btn-assist" onclick="screenAssist()">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        Assist
      </button>
      <button class="action-btn" id="btn-record" onclick="toggleRecording()">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4" fill="currentColor"/></svg>
        Record
      </button>
      <button class="action-btn" id="btn-switch" onclick="switchScreen()" style="display:none" title="Switch screen">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 013.51 15"/></svg>
      </button>
    </div>
    <div class="input-row">
      <input type="text" id="q-input" placeholder="Type a question..." onkeydown="if(event.key==='Enter')sendQuestion()">
      <button onclick="sendQuestion()">Ask</button>
    </div>
  </div>
</div>

<script>
// ===== STATE =====
var TOKEN = null;
var SESSION_ID = null;
var ws = null;
var cards = [];
var reconnectTimer = null;
var reconnectAttempts = 0;
var activeFilter = 'all'; // 'all' or 'generated'
var CARD_CLEANUP_MS = 180000; // 3 minutes for matched card auto-removal
var pendingManualScroll = false; // true when user triggered a manual action, consume on next card
var userScrolledUp = false; // true when user has scrolled away from bottom

var isElectronMode = false;
var systemAudioStream = null;
var micStream = null;
var audioProcessor = null;
var micProcessor = null;

// Parse URL params
var params = new URLSearchParams(location.search);
TOKEN = params.get('token') || sessionStorage.getItem('token') || localStorage.getItem('token');
SESSION_ID = params.get('session');

function $(id) { return document.getElementById(id); }
function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function syntaxHL(code){
  var e=esc(code);
  var KW=/^(import|from|def|class|return|if|elif|else|for|while|try|except|finally|raise|with|as|in|not|and|or|is|None|True|False|self|yield|async|await|lambda|pass|break|continue|del|global|nonlocal|assert|function|const|let|var|new|this|typeof|instanceof|throw|catch|switch|case|default|export|extends|super|static|void|SELECT|FROM|WHERE|JOIN|LEFT|RIGHT|INNER|OUTER|ON|GROUP|BY|ORDER|HAVING|INSERT|INTO|VALUES|UPDATE|SET|DELETE|CREATE|TABLE|ALTER|DROP|INDEX|AND|OR|NOT|NULL|AS|DISTINCT|UNION|LIMIT|OFFSET|BETWEEN|LIKE|IN|EXISTS|CASE|WHEN|THEN|ELSE|END|COUNT|SUM|AVG|MAX|MIN|func|package|fmt|go|defer|chan|map|range|struct|interface|type|println|printf|print|public|private|protected|abstract|final|implements|throws|enum|synchronized)$/;
  var FN=/^(print|len|range|str|int|float|list|dict|set|tuple|bool|type|input|open|map|filter|zip|enumerate|sorted|reversed|sum|min|max|abs|round|format|isinstance|hasattr|getattr|setattr|super|console|document|window|Math|Array|Object|String|Number|JSON|Promise|setTimeout|setInterval|require|module|exports|pd|np|plt|DataFrame|Series|read_csv|to_csv|groupby|merge|concat|apply|describe)$/;
  return e.replace(/(#.*|\/\/.*)|("""[\s\S]*?"""|'''[\s\S]*?'''|"(?:[^"\\]|\\.)*?"|'(?:[^'\\]|\\.)*?')|(@\w+)|(\b[a-zA-Z_]\w*\b)|(\b\d+\.?\d*(?:e[+-]?\d+)?\b)/gm,function(m,cmt,str,dec,word,num){
    if(cmt)return'<span class="sh-cmt">'+cmt+'</span>';
    if(str)return'<span class="sh-str">'+str+'</span>';
    if(dec)return'<span class="sh-dec">'+dec+'</span>';
    if(word){if(KW.test(word))return'<span class="sh-kw">'+word+'</span>';if(FN.test(word))return'<span class="sh-fn">'+word+'</span>';return word;}
    if(num)return'<span class="sh-num">'+num+'</span>';
    return m;
  });
}

// ===== WEBSOCKET =====
function connect() {
  if (!TOKEN || !SESSION_ID) {
    setStatus('No session', 'off');
    return;
  }

  setStatus('Connecting...', 'wait');

  var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host);

  ws.onopen = function() {
    setStatus('Live', 'on');
    reconnectAttempts = 0;
    // Electron mode: connect as full client with audio capture
    // Canvas/popout mode: passive listener only
    var connectMode = isElectronMode ? 'full' : 'canvas';
    var startMsg = {
      type: 'start',
      token: TOKEN,
      sessionId: SESSION_ID,
      mode: connectMode,
      platform: isElectronMode ? 'electron' : 'web'
    };
    if (isElectronMode) startMsg.dualStream = true;
    ws.send(JSON.stringify(startMsg));
    if (isElectronMode) {
      startElectronAudio();
    }
  };

  ws.onclose = function(evt) {
    ws = null;
    // If kicked by server (another device went live), stop — don't reconnect
    if (evt.code === 4001) {
      setStatus('Kicked — live on another device', 'off');
      if (reconnectTimer) clearTimeout(reconnectTimer);
      return;
    }
    setStatus('Disconnected', 'off');
    // Auto-reconnect with backoff
    reconnectAttempts++;
    var delay = Math.min(3000 * reconnectAttempts, 15000);
    if (reconnectTimer) clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(connect, delay);
  };

  ws.onerror = function() {
    setStatus('Error', 'off');
  };

  ws.onmessage = function(evt) {
    var msg;
    try { msg = JSON.parse(evt.data); } catch(e) { return; }

    if (msg.type === 'match') {
      var scroll = pendingManualScroll; pendingManualScroll = false;
      addCard(msg.questionId, msg.questionText, msg.answer || '', 'matched', msg.similarity, false, scroll);
    }
    else if (msg.type === 'new_question') {
      var scroll = pendingManualScroll; pendingManualScroll = false;
      addCard(msg.questionId, msg.questionText, '', 'new', 0, !!msg.generated, scroll);
    }
    else if (msg.type === 'live_answer') {
      addCard(msg.questionId, msg.questionText, msg.answer, msg.isNew ? 'new' : 'matched', 0, msg.isNew, false);
    }
    else if (msg.type === 'question_detected') {
      // Flash border on the button
      var btn = $('btn-wsay');
      btn.style.borderColor = '#34D399';
      setTimeout(function() { btn.style.borderColor = ''; }, 1000);
    }
    else if (msg.type === 'screen_assist') {
      addCard(msg.questionId, msg.questionText || 'Screen Assist', msg.answer || '', 'screen', 0, false, true);
    }
    else if (msg.type === 'status') {
      // Server status message (e.g. "Canvas connected")
      console.log('[Server]', msg.message);
    }
    else if (msg.type === 'error') {
      console.warn('[WS Error]', msg.message);
    }
    else if (msg.type === 'kicked') {
      // Another device went live — show alert and stop
      addCard('⚠️ Live session ended', msg.message || 'Live started on another device. Only one live session allowed at a time.', 'system');
      setStatus('Kicked — live on another device', 'off');
    }
  };
}

// ===== CARD RENDERING =====
function formatAnswer(text) {
  if (!text) return '<div class="sc-card-loading"><span class="spinner" style="width:14px;height:14px"></span> Generating answer...</div>';
  var html = '';
  var inCode = false;
  var codeLines = [];
  var lines = text.split('\n');
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    if (/^```/.test(line.trim())) {
      if (!inCode) { inCode = true; codeLines = []; }
      else { html += '<pre><code>' + syntaxHL(codeLines.join('\n')) + '</code></pre>'; inCode = false; codeLines = []; }
      continue;
    }
    if (inCode) { codeLines.push(line); continue; }
    var processed = esc(line).replace(/`([^`]+)`/g, '<code>$1</code>');
    if (line.trim() === '') { html += '<div class="sc-blank"></div>'; }
    else { html += '<div class="sc-line">' + processed + '</div>'; }
  }
  if (inCode && codeLines.length) { html += '<pre><code>' + syntaxHL(codeLines.join('\n')) + '</code></pre>'; }
  return html;
}

function addCard(id, question, answer, source, similarity, isGenerated, shouldScroll) {
  // Update existing card if already shown
  var existing = cards.find(function(c) { return c.id === id; });
  if (existing) {
    existing.answer = answer;
    var el = document.getElementById('card-' + id);
    if (el) {
      var aEl = el.querySelector('.sc-card-a');
      if (aEl) aEl.innerHTML = formatAnswer(answer);
      // Scroll to updated card if user hasn't scrolled up
      if (!userScrolledUp) {
        setTimeout(function() { el.scrollIntoView({ behavior: 'smooth', block: 'end' }); }, 100);
      }
    }
    return;
  }

  cards.push({ id: id, question: question, answer: answer, source: source, similarity: similarity, generated: !!isGenerated, ts: Date.now() });

  var tagClass, tagText;
  if (source === 'screen') {
    tagClass = 'screen';
    tagText = 'Screen';
  } else if (isGenerated) {
    tagClass = 'generated';
    tagText = 'AI Generated';
  } else if (source === 'matched') {
    tagClass = 'matched';
    tagText = 'Prepped ' + (similarity || '') + '%';
  } else if (source === 'manual') {
    tagClass = 'manual';
    tagText = 'Asked';
  } else {
    tagClass = 'new';
    tagText = 'New';
  }

  var card = document.createElement('div');
  card.className = 'sc-card card-new tag-' + tagClass;
  card.id = 'card-' + id;
  card.dataset.source = isGenerated ? 'generated' : source;
  // Remove glow class after animation completes
  setTimeout(function() { card.classList.remove('card-new'); }, 1600);

  // Dismiss button for generated cards; matched cards auto-remove
  var dismissHtml = isGenerated ? '<button class="card-dismiss" onclick="dismissCard(\'' + id + '\')" title="Dismiss">&times;</button>' : '';

  card.innerHTML = dismissHtml + '<div class="sc-card-q"><span class="sc-tag ' + tagClass + '">' + tagText + '</span><div class="sc-q-text">' + esc(question) + '</div></div><div class="sc-card-a">' + formatAnswer(answer) + '</div>';

  // Apply current filter visibility
  if (activeFilter === 'generated' && !isGenerated) {
    card.style.display = 'none';
  }

  var feed = $('feed');
  var emptyEl = $('empty-state');
  if (emptyEl) emptyEl.remove();
  feed.appendChild(card);

  // Auto-scroll to new card unless user has scrolled up to read older content
  // Always scroll for manual actions (What should I say, typed question)
  if (shouldScroll || !userScrolledUp) {
    setTimeout(function() { card.scrollIntoView({ behavior: 'smooth', block: 'end' }); }, 100);
  }

  // Auto-cleanup matched/bank cards after 3 minutes — generated cards persist
  if (!isGenerated && source === 'matched') {
    setTimeout(function() {
      var el = document.getElementById('card-' + id);
      if (el) {
        el.classList.add('fade-out');
        setTimeout(function() { el.remove(); }, 400);
      }
      // Remove from cards array too
      cards = cards.filter(function(c) { return c.id !== id; });
    }, CARD_CLEANUP_MS);
  }
}

function dismissCard(id) {
  var el = document.getElementById('card-' + id);
  if (el) {
    el.classList.add('fade-out');
    setTimeout(function() { el.remove(); }, 400);
  }
  cards = cards.filter(function(c) { return c.id !== id; });
}

function setFilter(filter) {
  activeFilter = filter;
  $('filter-all').className = 'filter-btn' + (filter === 'all' ? ' active' : '');
  $('filter-generated').className = 'filter-btn' + (filter === 'generated' ? ' active' : '');
  // Show/hide cards based on filter
  cards.forEach(function(c) {
    var el = document.getElementById('card-' + c.id);
    if (!el) return;
    if (filter === 'generated' && !c.generated) {
      el.style.display = 'none';
    } else {
      el.style.display = '';
    }
  });
}

// ===== SCREEN ASSIST =====
var screenStream = null;
var recordingInterval = null;
var isRecording = false;
var RECORD_INTERVAL_MS = 8000;

var assistDefaultHTML = '<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg> Assist';
var recordDefaultHTML = '<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4" fill="currentColor"/></svg> Record';

async function getScreenStream() {
  // Reuse existing stream if still active with a live video track
  if (screenStream && screenStream.active) {
    var tracks = screenStream.getVideoTracks();
    if (tracks.length && tracks[0].readyState === 'live') return screenStream;
  }
  try {
    screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
    screenStream.getVideoTracks()[0].addEventListener('ended', function() {
      stopRecording();
      screenStream = null;
      $('btn-switch').style.display = 'none';
    });
    // Show switch button now that we have a stream
    $('btn-switch').style.display = '';
    return screenStream;
  } catch(e) {
    console.warn('Screen capture denied:', e);
    return null;
  }
}

async function switchScreen() {
  // Stop current stream
  if (screenStream) {
    screenStream.getTracks().forEach(function(t) { t.stop(); });
    screenStream = null;
  }
  // Stop recording if active
  if (isRecording) stopRecording();
  // Prompt for new screen
  try {
    screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
    screenStream.getVideoTracks()[0].addEventListener('ended', function() {
      stopRecording();
      screenStream = null;
      $('btn-switch').style.display = 'none';
    });
    $('btn-switch').style.display = '';
  } catch(e) {
    console.warn('Switch screen denied:', e);
    $('btn-switch').style.display = 'none';
  }
}

function captureFrame(stream) {
  return new Promise(function(resolve, reject) {
    var track = stream.getVideoTracks()[0];
    if (!track || track.readyState !== 'live') { reject(new Error('Track not live')); return; }
    var video = document.createElement('video');
    video.srcObject = stream;
    video.onloadedmetadata = function() {
      video.play().then(function() {
        // Resize to max 1280px wide for speed — full res is unnecessary
        var MAX_W = 1280;
        var w = video.videoWidth;
        var h = video.videoHeight;
        if (w > MAX_W) { h = Math.round(h * MAX_W / w); w = MAX_W; }
        var canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(video, 0, 0, w, h);
        video.pause();
        video.srcObject = null;
        // JPEG at 70% quality — much smaller than PNG
        var dataUrl = canvas.toDataURL('image/jpeg', 0.7);
        var base64 = dataUrl.split(',')[1];
        resolve(base64);
      }).catch(reject);
    };
    video.onerror = reject;
  });
}

async function sendScreenCapture(base64) {
  if (!TOKEN || !SESSION_ID) return;
  var cardId = 'screen-' + Date.now();
  addCard(cardId, 'Analyzing screen...', '', 'screen', 0, false, true);
  try {
    var r = await fetch('/api/sessions/' + SESSION_ID + '/screen-assist', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: base64 })
    });
    if (!r.ok) throw new Error('Server error ' + r.status);
    var data = await r.json();
    // Update the placeholder card with real answer
    var el = document.getElementById('card-' + cardId);
    if (el) {
      var qEl = el.querySelector('.sc-q-text');
      if (qEl && data.questionText) qEl.textContent = data.questionText;
      var aEl = el.querySelector('.sc-card-a');
      if (aEl) aEl.innerHTML = formatAnswer(data.answer || 'No answer generated');
    }
    // Update cards array
    var c = cards.find(function(x) { return x.id === cardId; });
    if (c) { c.answer = data.answer; if (data.questionText) c.question = data.questionText; }
  } catch(e) {
    var el = document.getElementById('card-' + cardId);
    if (el) {
      var aEl = el.querySelector('.sc-card-a');
      if (aEl) aEl.innerHTML = '<div class="sc-line" style="color:#F87171">Error: ' + esc(e.message) + '</div>';
    }
  }
}

async function screenAssist() {
  var btn = $('btn-assist');
  if (btn.classList.contains('loading')) return;
  btn.classList.add('loading');
  btn.innerHTML = '<span class="spinner" style="width:10px;height:10px"></span>';
  try {
    var stream = await getScreenStream();
    if (!stream) { btn.classList.remove('loading'); btn.innerHTML = assistDefaultHTML; return; }
    var base64 = await captureFrame(stream);
    // Don't stop stream — user might want to record next
    await sendScreenCapture(base64);
  } catch(e) {
    console.warn('Screen assist error:', e);
  }
  btn.classList.remove('loading');
  btn.innerHTML = assistDefaultHTML;
}

function toggleRecording() {
  if (isRecording) {
    stopRecording();
  } else {
    startRecording();
  }
}

async function startRecording() {
  var btn = $('btn-record');
  var stream = await getScreenStream();
  if (!stream) return;
  isRecording = true;
  btn.classList.add('recording');
  btn.innerHTML = '<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1" fill="currentColor"/></svg> Stop';
  // Capture immediately, then every 8s
  try {
    var base64 = await captureFrame(stream);
    await sendScreenCapture(base64);
  } catch(e) { console.warn('Initial capture failed:', e); }
  recordingInterval = setInterval(async function() {
    if (!screenStream || !screenStream.active) { stopRecording(); return; }
    try {
      var base64 = await captureFrame(screenStream);
      await sendScreenCapture(base64);
    } catch(e) { console.warn('Recording capture failed:', e); stopRecording(); }
  }, RECORD_INTERVAL_MS);
}

function stopRecording() {
  isRecording = false;
  if (recordingInterval) { clearInterval(recordingInterval); recordingInterval = null; }
  var btn = $('btn-record');
  if (btn) { btn.classList.remove('recording'); btn.innerHTML = recordDefaultHTML; }
  // Keep stream alive for quick re-use — it dies when user stops sharing
}

var stealthOn = true; // Default: content protection ON

  if (btn) {
    btn.textContent = 'Stealth: ' + (stealthOn ? 'On' : 'Off');
    if (stealthOn) {
      btn.classList.add('active-green');
      btn.classList.remove('active-red');
    } else {
      btn.classList.remove('active-green');
      btn.classList.add('active-red');
    }
  }
  if (window.electronAPI && window.electronAPI.setStealth) {
    window.electronAPI.setStealth(stealthOn);
  }
}
// Set initial stealth button state
setTimeout(function() {
  var btn = $('btn-stealth');
  if (btn && isElectronMode) btn.classList.add('active-green');
}, 150);

// ===== SESSION PICKER =====
async function loadSessions() {
  if (!TOKEN) {
    $('feed').innerHTML = '<div class="empty-state"><h3>Not logged in</h3><p>Open xhire.app, log in, go live, then click "Desktop" in Xhire Pilot.</p></div>';
    return;
  }
  if (SESSION_ID) { connect(); return; }

  // Fetch sessions
  $('feed').innerHTML = '<div class="empty-state"><span class="spinner" style="width:20px;height:20px"></span><h3 style="margin-top:12px">Loading sessions...</h3></div>';
  try {
    var r = await fetch('/api/sessions', { headers: { 'Authorization': 'Bearer ' + TOKEN } });
    if (!r.ok) throw new Error('Auth failed');
    var sessions = await r.json();
    if (!sessions.length) {
      $('feed').innerHTML = '<div class="empty-state"><h3>No sessions</h3><p>Create a session on xhire.app first.</p></div>';
      return;
    }
    var html = '<div style="padding:4px"><div style="font:700 12px Inter,sans-serif;color:#a78bfa;margin-bottom:10px;padding:0 2px">Select a session:</div>';
    sessions.forEach(function(s) {
      html += '<div class="session-item" onclick="pickSession(' + s.id + ')">'
        + '<h4>' + esc(s.company || 'Untitled') + ' — ' + esc(s.role || '') + '</h4>'
        + '<p>' + (s.question_count || 0) + ' questions</p>'
        + '</div>';
    });
    html += '</div>';
    $('feed').innerHTML = html;
  } catch(e) {
    $('feed').innerHTML = '<div class="empty-state"><h3>Connection error</h3><p>' + esc(e.message || 'Make sure xhire.app is running.') + '</p></div>';
  }
}

function pickSession(id) {
  SESSION_ID = id;
  var url = new URL(location.href);
  url.searchParams.set('session', id);
  history.replaceState(null, '', url.toString());
  $('feed').innerHTML = '<div class="empty-state" id="empty-state"><h3>Xhire Pilot Ready</h3><p>Go Live on xhire.app, then answers stream here automatically.</p></div>';
  connect();
}

// ===== ELECTRON AUDIO CAPTURE =====
var electronAudioCtx1 = null, electronAudioCtx2 = null;
var electronProc1 = null, electronProc2 = null;
var electronSrc1 = null, electronSrc2 = null;
var electronLive = false;
var electronUserSpeaking = false;

var audioDebugCounter = 0;
var ch1HasAudio = false, ch2HasAudio = false;

function processAudioStream(stream, channel) {
  var tracks = stream.getAudioTracks();
  console.log('[Audio] Ch' + channel + ': ' + tracks.length + ' audio tracks', tracks.map(function(t) { return t.label + ' (' + t.readyState + ')'; }));
  if (tracks.length === 0) {
    console.error('[Audio] Ch' + channel + ': NO AUDIO TRACKS');
    setStatus('No audio Ch' + channel, 'off');
    return;
  }
  var audioOnly = new MediaStream(tracks);
  var audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
  var source = audioCtx.createMediaStreamSource(audioOnly);
  var processor = audioCtx.createScriptProcessor(4096, 1, 1);

  var LOUD_THRESHOLD = 0.015;
  var loudFrames = 0, quietFrames = 0;

  processor.onaudioprocess = function(e) {
    if (!electronLive || !ws || ws.readyState !== WebSocket.OPEN) return;
    var inputData = e.inputBuffer.getChannelData(0);

    // RMS volume
    var sum = 0;
    for (var i = 0; i < inputData.length; i++) { sum += inputData[i] * inputData[i]; }
    var rms = Math.sqrt(sum / inputData.length);

    // Debug: show audio levels periodically
    audioDebugCounter++;
    if (audioDebugCounter % 50 === 0) {
      if (channel === 1 && rms > 0.001) ch1HasAudio = true;
      if (channel === 2 && rms > 0.001) ch2HasAudio = true;
      var statusText = 'Live';
      if (ch1HasAudio || ch2HasAudio) statusText += ' — ' + (ch1HasAudio ? 'Sys✓' : 'Sys✗') + ' ' + (ch2HasAudio ? 'Mic✓' : 'Mic✗');
      setStatus(statusText, 'on');
    }

    // Track speaking state on mic channel
    if (channel === 2) {
      if (rms > LOUD_THRESHOLD) { loudFrames++; quietFrames = 0; }
      else { quietFrames++; loudFrames = 0; }
      var wasSpeaking = electronUserSpeaking;
      if (loudFrames >= 3) electronUserSpeaking = true;
      if (quietFrames >= 6) electronUserSpeaking = false;
      if (electronUserSpeaking !== wasSpeaking) {
        ws.send(JSON.stringify({ type: 'user_speaking', speaking: electronUserSpeaking }));
      }
    }

    // Convert float32 → int16 PCM
    var pcm16 = new Int16Array(inputData.length);
    for (var i = 0; i < inputData.length; i++) {
      var s = Math.max(-1, Math.min(1, inputData[i]));
      pcm16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
    }
    // Prepend channel byte
    var buffer = new Uint8Array(pcm16.buffer.byteLength + 1);
    buffer[0] = channel;
    buffer.set(new Uint8Array(pcm16.buffer), 1);
    ws.send(buffer);
  };

  source.connect(processor);
  processor.connect(audioCtx.destination);

  if (channel === 1) { electronAudioCtx1 = audioCtx; electronProc1 = processor; electronSrc1 = source; }
  else { electronAudioCtx2 = audioCtx; electronProc2 = processor; electronSrc2 = source; }
}

function stopElectronAudio() {
  electronLive = false;
  [{ ctx: electronAudioCtx1, proc: electronProc1, src: electronSrc1 },
   { ctx: electronAudioCtx2, proc: electronProc2, src: electronSrc2 }].forEach(function(a) {
    try { if (a.proc) a.proc.disconnect(); } catch(e) {}
    try { if (a.src) a.src.disconnect(); } catch(e) {}
    try { if (a.ctx) a.ctx.close(); } catch(e) {}
  });
  electronAudioCtx1 = electronAudioCtx2 = null;
  electronProc1 = electronProc2 = null;
  electronSrc1 = electronSrc2 = null;
  if (systemAudioStream) { systemAudioStream.getTracks().forEach(function(t) { t.stop(); }); systemAudioStream = null; }
  if (micStream) { micStream.getTracks().forEach(function(t) { t.stop(); }); micStream = null; }
}

async function startElectronAudio() {
  // Update empty state message for Electron mode
  var msg = $('empty-msg');
  if (msg) msg.textContent = 'Click Go Live above to start capturing audio.';
}

function updateLiveUI(isLive) {
  var tb = $('btn-live-tb');
  if (tb) {
    if (isLive) {
      tb.textContent = '■ Stop';
      tb.className = 'ctrl-btn active-red';
    } else {
      tb.textContent = 'Go Live';
      tb.className = 'ctrl-btn active-green';
    }
  }
  // Also update the dot in the titlebar
  var dot = document.querySelector('.titlebar .dot');
  if (dot) {
    dot.style.background = isLive ? '#34D399' : '#F87171';
  }
}

async function toggleElectronLive() {
  if (electronLive) {
    stopElectronAudio();
    updateLiveUI(false);
    setStatus('Live', 'on');
  } else {
    await goLiveElectron();
    if (electronLive) {
      updateLiveUI(true);
    }
  }
}

async function goLiveElectron() {
  var tb = $('btn-live-tb');
  if (tb) { tb.textContent = 'Starting...'; tb.className = 'ctrl-btn'; }

  try {
    // Step 1: Capture system audio via getDisplayMedia
    systemAudioStream = await navigator.mediaDevices.getDisplayMedia({
      video: true,   // Required by Chromium to show the picker
      audio: true    // System audio via electron-audio-loopback
    });

    if (systemAudioStream.getAudioTracks().length === 0) {
      if (tb) { tb.textContent = 'Go Live'; tb.className = 'ctrl-btn active-green'; }
      setStatus('No audio track', 'off');
      return;
    }

    // Handle user stopping the share
    systemAudioStream.getAudioTracks()[0].onended = function() {
      stopElectronAudio();
      updateLiveUI(false);
      setStatus('Live', 'on');
    };

    // Step 2: Get mic for user voice
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
    });

    // Step 3: Start processing both streams
    electronLive = true;
    processAudioStream(systemAudioStream, 1);  // Channel 1 = interviewer/system
    processAudioStream(micStream, 2);           // Channel 2 = user mic

    // Update UI
    updateLiveUI(true);
    setStatus('Live — Audio', 'on');
    var empty = $('empty-state');
    if (empty) empty.style.display = 'none';

  } catch(e) {
    console.error('[Electron] Audio capture error:', e);
    if (tb) { tb.textContent = 'Go Live'; tb.className = 'ctrl-btn active-green'; }
    setStatus('Audio error', 'off');
    stopElectronAudio();
  }
}

// ===== INIT =====
loadSessions();
</script>
